<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Login Page</title>
</head>
<body>
    <div class="container">
        <div class="cover">
            <img src="img/noPlastic.jpg" alt="">
        </div>
        <div class="login">
            <div class="logo">
                <img src="img/schoolLogo.png" alt="">
                <p>Student Login</p>
            </div>
            <div class="form">
                <label for="">Email Address</label><br>
                <input type="text" placeholder="someone@caisedu.com">
                <br>
                <label for="">Password</label><br>
                <input type="text" placeholder="**********">
            </div>
        </div>
    </div>
</body>
</html>
